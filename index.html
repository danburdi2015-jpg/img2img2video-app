<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>AI Image Transformer</title>\n    <style>\n        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }\n        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }\n        h1 { text-align: center; color: #333; }\n        input[type='file'], button { width: 100%; margin-top: 10px; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }\n        button { background-color: #5cb85c; color: white; }\n    </style>\n</head>\n<body>\n    <div class='container'>\n        <h1>AI Image Transformer</h1>\n        <input type='file' id='imageUpload' accept='image/*' />\n        <input type='text' id='replicateApiToken' placeholder='Replicate API Token' />\n        <input type='text' id='huggingFaceApiToken' placeholder='Hugging Face API Token' />\n        <button id='transformButton'>Transform Image</button>\n        <div id='output' style='margin-top: 20px;'></div>\n    </div>\n    <script>\n        document.getElementById('transformButton').addEventListener('click', async () => {\n            const image = document.getElementById('imageUpload').files[0];\n            const replicateApiToken = document.getElementById('replicateApiToken').value;\n            const huggingFaceApiToken = document.getElementById('huggingFaceApiToken').value;\n\n            if (!image || !replicateApiToken || !huggingFaceApiToken) {\n                alert('Please provide an image and API tokens.');\n                return;\n            }\n\n            const formData = new FormData();\n            formData.append('image', image);\n\n            try {\n                // img2img functionality\n                let response = await fetch('https://api.replicate.com/v1/predictions', {\n                    method: 'POST',\n                    headers: {\n                        'Authorization': `Token ${replicateApiToken}`,\n                        'Content-Type': 'application/json'\n                    },\n                    body: JSON.stringify({ model: 'replicate/model-name', inputs: { image: URL.createObjectURL(image) } })\n                });\n                let result = await response.json();\n                document.getElementById('output').innerHTML += '<img src=' + result.output + ' alt='Transformed Image' style='width: 100%; margin-top: 20px;' />';\n\n                // img2video functionality\n                response = await fetch('https://api.huggingface.co/models/huggingface/model-name/generate', {\n                    method: 'POST',\n                    headers: {\n                        'Authorization': `Bearer ${huggingFaceApiToken}`,\n                        'Content-Type': 'application/json'\n                    },\n                    body: JSON.stringify({ inputs: { image: URL.createObjectURL(image) } })\n                });\n                result = await response.json();\n                // Assuming result.output contains the video URL\n                document.getElementById('output').innerHTML += '<video controls style='width: 100%; margin-top: 20px;'><source src=' + result.output + ' type='video/mp4' />Your browser does not support the video tag.</video>';\n            } catch (error) {\n                console.error('Error:', error);\n                alert('An error occurred while transforming the image.');\n            }\n        });\n    <\/script>\n</body>\n</html>
